<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Kerala Election Predictor 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f8;--sur:#fff;--sur2:#f0f2f4;--bd:#e0e4e8;--bd2:#c8cdd4;
  --tx:#1a2332;--tx2:#5a6475;--tx3:#9aa0aa;
  --ldf:#cc0000;--ldf-bg:#fff0f0;--ldf-bd:#ffb3b0;
  --udf:#0057e7;--udf-bg:#f0f4ff;--udf-bd:#b3c8ff;
  --nda:#ff6600;--nda-bg:#fff4ee;--nda-bd:#ffc299;
  --oth:#6b21a8;--oth-bg:#f5f0ff;--oth-bd:#d8b4fe;
  --grn:#16a34a;--grn-bg:#f0fdf4;--grn-bd:#86efac;
  --r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent}
#root{padding-bottom:32px}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#991b1b,#1e3a8a);color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:10px;opacity:.75;margin-top:1px}
.ubadge{font-size:12px;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px;white-space:nowrap}
.lbtn{font-size:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:var(--font);min-height:30px}

/* TABS */
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:99;overflow-x:auto}
.tab{padding:11px 12px;text-align:center;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--ldf);border-bottom-color:var(--ldf)}

/* NEWS TICKER */
.news-bar{background:var(--udf-bg);border-bottom:1px solid var(--udf-bd);padding:7px 12px;display:flex;align-items:center;gap:10px;overflow:hidden}
.news-label{font-size:11px;font-weight:700;background:var(--udf);color:#fff;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.news-scroll{overflow:hidden;flex:1}
.news-inner{display:flex;gap:40px;animation:ticker 45s linear infinite;width:max-content}
.news-inner:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.news-item{white-space:nowrap;font-size:12px;color:var(--udf);text-decoration:none}
.news-item:hover{text-decoration:underline}

/* AUTH */
.awrap{max-width:360px;margin:3rem auto;padding:0 1rem}
.acard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:1.75rem}
.alogo{text-align:center;margin-bottom:1.5rem}
.alogo h1{font-size:21px;font-weight:700}
.alogo p{font-size:13px;color:var(--tx2);margin-top:4px}
.atabs{display:flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:1.25rem}
.atab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx2);background:var(--sur);border:none;font-family:var(--font)}
.atab.on{background:var(--ldf);color:#fff}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.fld input{width:100%;padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--r);font-size:15px;font-family:var(--font);background:var(--sur);color:var(--tx);outline:none;min-height:44px}
.fld input:focus{border-color:#1d4ed8}
.abtn{width:100%;padding:11px;background:linear-gradient(135deg,#991b1b,#1e3a8a);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;min-height:44px}
.aerr{font-size:13px;color:#dc2626;background:#fff0f0;border:1px solid #fca5a5;border-radius:var(--r);padding:8px 11px;margin-top:9px;display:none}

/* WRAP */
.wrap{padding:.75rem}
.notice{border-radius:var(--r);padding:10px 12px;font-size:13px;margin-bottom:.75rem;border:1px solid}
.notice-info{background:var(--udf-bg);border-color:var(--udf-bd);color:var(--udf)}
.notice-warn{background:#fff0f0;border-color:var(--ldf-bd);color:var(--ldf)}
.notice-grn{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn)}
.loading{text-align:center;padding:2rem;color:var(--tx2);font-size:13px}
.csv-bar{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.csv-btn{font-size:12px;padding:6px 12px;background:#f0f4ff;border:1px solid var(--udf-bd);color:var(--udf);border-radius:var(--r);cursor:pointer;font-family:var(--font);min-height:32px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:4px}

/* PROGRESS */
.prog-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:1rem;margin-bottom:.75rem}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pbar{height:9px;background:var(--bd);border-radius:5px;overflow:hidden}
.pbar-f{height:100%;background:linear-gradient(90deg,#15803d,#22c55e);border-radius:5px;transition:width .3s}
.tally{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.ti{text-align:center;padding:6px 4px;border-radius:var(--r);border:1px solid}
.ti-ldf{background:var(--ldf-bg);border-color:var(--ldf-bd)}.ti-ldf .tl,.ti-ldf .tn{color:var(--ldf)}
.ti-udf{background:var(--udf-bg);border-color:var(--udf-bd)}.ti-udf .tl,.ti-udf .tn{color:var(--udf)}
.ti-nda{background:var(--nda-bg);border-color:var(--nda-bd)}.ti-nda .tl,.ti-nda .tn{color:var(--nda)}
.ti-oth{background:var(--oth-bg);border-color:var(--oth-bd)}.ti-oth .tl,.ti-oth .tn{color:var(--oth)}
.tl{font-size:10px;font-weight:700;letter-spacing:.04em}
.tn{font-size:20px;font-weight:700;line-height:1.2}

/* DISTRICT ACCORDION */
.dist-block{margin-top:.5rem}
.dist-hdr-row{font-size:12px;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.dist-hdr-row.open{background:var(--sur2);border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent}
.dist-tally{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.dt-pill{font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px}
.dt-ldf{background:var(--ldf-bg);color:var(--ldf)}
.dt-udf{background:var(--udf-bg);color:var(--udf)}
.dt-nda{background:var(--nda-bg);color:var(--nda)}
.dt-oth{background:var(--oth-bg);color:var(--oth)}
.dist-arrow{font-size:14px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.dist-arrow.open{transform:rotate(90deg)}
.dist-seats{display:none;border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;margin-bottom:.5rem}
.dist-seats.open{display:block}

/* CONSTITUENCY ROWS */
.crow{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--sur);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.crow:last-child{border-bottom:none}
.cnum{font-size:11px;color:var(--tx3);width:22px;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-size:13px;font-weight:500;color:var(--tx)}
.cmla{font-size:11px;color:var(--tx2);margin-top:1px}
.mpill{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:4px}
.mp-ldf{background:var(--ldf-bg);color:var(--ldf)}.mp-udf{background:var(--udf-bg);color:var(--udf)}
.mp-nda{background:var(--nda-bg);color:var(--nda)}.mp-oth{background:var(--oth-bg);color:var(--oth)}
.pbtns{display:flex;gap:3px;flex-shrink:0}
.pbtn{padding:5px 7px;border-radius:6px;font-size:11px;font-weight:600;border:1.5px solid;cursor:pointer;font-family:var(--font);min-height:32px;min-width:38px;touch-action:manipulation}
.pbtn-ldf{border-color:var(--ldf-bd);color:var(--ldf);background:var(--sur)}.pbtn-ldf.sel{background:var(--ldf);color:#fff;border-color:var(--ldf)}
.pbtn-udf{border-color:var(--udf-bd);color:var(--udf);background:var(--sur)}.pbtn-udf.sel{background:var(--udf);color:#fff;border-color:var(--udf)}
.pbtn-nda{border-color:var(--nda-bd);color:var(--nda);background:var(--sur)}.pbtn-nda.sel{background:var(--nda);color:#fff;border-color:var(--nda)}
.pbtn-oth{border-color:var(--oth-bd);color:var(--oth);background:var(--sur)}.pbtn-oth.sel{background:var(--oth);color:#fff;border-color:var(--oth)}
.pbtn:active{transform:scale(.93)}
.sind{font-size:10px;color:var(--tx3);width:16px;text-align:right}

/* CHART GRID */
.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:.75rem}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}

/* CHART */
.chart-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:1rem;margin-bottom:.75rem}
.chart-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px}
.chart-sub{font-size:12px;color:var(--tx2);margin-bottom:.75rem}

/* PLAYER CARDS */
.pcard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:.625rem}
.pcard-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:8px;flex-wrap:wrap}
.pcard-hdr:active{background:var(--sur2)}
.pname{font-size:14px;font-weight:600;color:var(--tx)}
.ppills{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.ppill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.pp-ldf{background:var(--ldf-bg);color:var(--ldf)}.pp-udf{background:var(--udf-bg);color:var(--udf)}
.pp-nda{background:var(--nda-bg);color:var(--nda)}.pp-oth{background:var(--oth-bg);color:var(--oth)}
.pp-none{background:var(--sur2);color:var(--tx3)}
.pdet{display:none;overflow-x:auto;border-top:1px solid var(--bd)}
.pdet.open{display:block}
.arrow{color:var(--tx3);font-size:16px;flex-shrink:0}

/* COMPARE BAR */
.compare-bar{padding:10px 14px;background:var(--udf-bg);border-bottom:1px solid var(--udf-bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.compare-bar label{font-size:12px;color:var(--udf);font-weight:600;white-space:nowrap}
.compare-bar select{font-size:13px;padding:5px 8px;border:1px solid var(--udf-bd);border-radius:var(--r);background:var(--sur);color:var(--tx);font-family:var(--font);flex:1;min-width:120px}
.cmp-btn{font-size:12px;padding:5px 12px;background:var(--udf);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font);min-height:32px}

/* TABLE */
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{padding:7px 10px;text-align:left;font-weight:600;color:var(--tx2);background:var(--sur2);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:1}
.dtbl td{padding:6px 10px;border-bottom:1px solid var(--bd);color:var(--tx)}
.dtbl tr:last-child td{border-bottom:none}
.strike-yes td{background:#f0fdf4}.strike-no td{background:#fff5f5}.match-row td{background:#fffbeb}
.sbadge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-block}
.sb-yes{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd)}
.sb-no{background:#fff0f0;color:var(--ldf);border:1px solid var(--ldf-bd)}
.sb-pend{background:var(--sur2);color:var(--tx3);border:1px solid var(--bd)}
.sb-match{background:#fffbeb;color:#92400e;border:1px solid #fde68a}

/* SR BADGES */
.sr-badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px}
.sr-hi{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd)}
.sr-mi{background:#fff4ee;color:#c2410c;border:1px solid #fcd9bd}
.sr-lo{background:#fff0f0;color:var(--ldf);border:1px solid var(--ldf-bd)}
.sr-na{background:var(--sur2);color:var(--tx3);border:1px solid var(--bd)}

/* LEADERBOARD */
.lb-wrap{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.lb-tbl{width:100%;border-collapse:collapse;font-size:13px}
.lb-tbl th{padding:10px 12px;text-align:left;font-weight:600;color:var(--tx2);background:var(--sur2);border-bottom:1px solid var(--bd);white-space:nowrap}
.lb-tbl td{padding:10px 12px;border-bottom:1px solid var(--bd);color:var(--tx)}
.lb-tbl tr:last-child td{border-bottom:none}
.lb-tbl tr:nth-child(1) td{background:#fffbeb}
.lb-tbl tr:nth-child(2) td{background:#f8fafc}
.lb-tbl tr:nth-child(3) td{background:#fff7ed}

/* ADMIN */
.adm-section{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:.75rem}
.adm-hdr{padding:10px 14px;background:#fff0f0;border-bottom:1px solid var(--ldf-bd);font-size:14px;font-weight:600;color:var(--ldf);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.adm-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.adm-row:last-child{border-bottom:none}
.del-btn{font-size:12px;padding:5px 12px;background:#fff0f0;border:1px solid var(--ldf-bd);color:var(--ldf);border-radius:var(--r);cursor:pointer;font-family:var(--font);min-height:32px}
.del-btn:active{background:var(--ldf);color:#fff}
.clear-all-btn{font-size:12px;padding:6px 14px;background:#fff0f0;border:1px solid var(--ldf-bd);color:var(--ldf);border-radius:var(--r);cursor:pointer;font-family:var(--font);min-height:34px;font-weight:600}

/* TEAM BUTTONS */
.team-btns{display:flex;gap:6px;flex-wrap:wrap}
.tbtn{padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:600;border:2px solid;cursor:pointer;font-family:var(--font);min-height:40px;opacity:.6;transition:all .15s}
.tbtn.active{opacity:1}
.tbtn-v{border-color:#1d4ed8;color:#1d4ed8;background:var(--sur)}.tbtn-v.active{background:#1d4ed8;color:#fff}
.tbtn-k{border-color:#dc2626;color:#dc2626;background:var(--sur)}.tbtn-k.active{background:#dc2626;color:#fff}
.tbtn-n{border-color:var(--tx3);color:var(--tx2);background:var(--sur)}.tbtn-n.active{background:var(--tx2);color:#fff}
.team-badge-v{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.team-badge-k{background:#fff0f0;color:#dc2626;border:1px solid #fca5a5;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.team-badge-n{background:var(--sur2);color:var(--tx3);border:1px solid var(--bd);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}

/* WATERMARK */
.watermark{position:fixed;bottom:10px;right:14px;font-size:11px;color:var(--tx3);pointer-events:none;z-index:50;font-weight:500;letter-spacing:.03em;opacity:.7}
</style>
</head>

DISTRICTS.forEach(function(d){d.seats.forEach(function(s){s.distName=d.name;CONST_MAP[s.id]=s;});});
var PARTIES=['LDF','UDF','NDA','Others'];

var PARTY_COLORS={LDF:'#cc0000',UDF:'#0057e7',NDA:'#ff6600',Others:'#6b21a8'};

var lockStatus=false;
var compareCache={};
var selectedTeam='Neutral';

function setTeam(team,btn){
  selectedTeam=team;
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

var S={
  loggedIn:false,username:'',isAdmin:false,
  tab:'predict',predictions:{},authMode:'login',
  compareWith:'',openDistricts:{}
};

function api(method,url,body,cb){
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  fetch(url,opts).then(function(r){return r.json();}).then(cb).catch(function(){cb({success:false,error:'Network error'});});
}

function init(){
  api('GET','/api/me',null,function(r){
    if(r.loggedIn){
      S.loggedIn=true;S.username=r.username;S.isAdmin=r.isAdmin;
      S.tab=r.isAdmin?'admin-users':'predict';
      if(!r.isAdmin){
        api('GET','/api/lock-status',null,function(lr){
          lockStatus=lr.locked||false;
          api('GET','/api/predictions/mine',null,function(pr){
            if(pr.success)S.predictions=pr.predictions;
            render();
            loadNews();
          });
        });
      } else render();
    } else render();
  });
}

function doAuth(){
  var un=(document.getElementById('au')||{}).value;
  var pw=(document.getElementById('ap')||{}).value;
  un=un?un.trim():'';pw=pw||'';
  var errEl=document.getElementById('aerr');
  if(errEl)errEl.style.display='none';
  api('POST',S.authMode==='login'?'/api/login':'/api/register',{username:un,password:pw,team:selectedTeam},function(r){
    if(r.success){
      S.loggedIn=true;S.username=r.username;S.isAdmin=r.isAdmin;
      S.tab=r.isAdmin?'admin-users':'predict';
      if(!r.isAdmin){
        api('GET','/api/lock-status',null,function(lr){
          lockStatus=lr.locked||false;
          api('GET','/api/predictions/mine',null,function(pr){
            if(pr.success)S.predictions=pr.predictions;
            render();loadNews();
          });
        });
      } else render();
    } else {
      var e=document.getElementById('aerr');
      if(e){e.textContent=r.error;e.style.display='block';}
    }
  });
}

function doLogout(){
  api('POST','/api/logout',{},function(){
    S.loggedIn=false;S.username='';S.isAdmin=false;
    S.predictions={};S.tab='predict';S.compareWith='';
    compareCache={};S.openDistricts={};render();
  });
}

function selectParty(cid,party){
  if(lockStatus)return;
  var cur=S.predictions[cid];
  if(cur===party){
    delete S.predictions[cid];
    api('POST','/api/predictions/clear',{constituencyId:cid},function(){});
  } else {
    S.predictions[cid]=party;
    var si=document.getElementById('si-'+cid);
    if(si)si.textContent='💾';
    api('POST','/api/predictions/save',{constituencyId:cid,party:party},function(){
      var s2=document.getElementById('si-'+cid);
      if(s2)s2.textContent='';
    });
  }
  updateProgressUI();
  updateRowUI(cid);
  updateDistrictTally(CONST_MAP[cid]?CONST_MAP[cid].distName:'');
}

function updateProgressUI(){
  var count=Object.keys(S.predictions).length;
  var f=document.getElementById('pbar-f');
  var c=document.getElementById('pcnt');
  if(f)f.style.width=Math.round(count/140*100)+'%';
  if(c)c.textContent=count+' / 140';
  var t={LDF:0,UDF:0,NDA:0,Others:0};
  Object.values(S.predictions).forEach(function(p){t[p]=(t[p]||0)+1;});
  PARTIES.forEach(function(p){var el=document.getElementById('tly-'+p);if(el)el.textContent=t[p]||0;});
}

function updateRowUI(cid){
  var party=S.predictions[cid];
  PARTIES.forEach(function(p){
    var btn=document.getElementById('btn-'+cid+'-'+p);
    if(btn){if(party===p)btn.classList.add('sel');else btn.classList.remove('sel');}
  });
}

function updateDistrictTally(dname){
  if(!dname)return;
  var d=DISTRICTS.find(function(x){return x.name===dname;});
  if(!d)return;
  var t={LDF:0,UDF:0,NDA:0,Others:0};
  d.seats.forEach(function(s){var p=S.predictions[s.id];if(p)t[p]=(t[p]||0)+1;});
  var key=d.name.replace(/\s/g,'_');
  var el=document.getElementById('dt-'+key);
  if(el)el.innerHTML=buildDistTally(d,t);
}

function buildDistTally(d,t){
  var pills=PARTIES.filter(function(p){return t[p]>0;}).map(function(p){
    return '<span class="dt-pill dt-'+PC[p]+'">'+p+' '+t[p]+'</span>';
  }).join('');
  return pills+'<span style="font-size:10px;color:var(--tx3);margin-left:4px">'+d.seats.length+' seats</span>';
}

function toggleDistrict(dname){
  S.openDistricts[dname]=!S.openDistricts[dname];
  var key=dname.replace(/\s/g,'_');
  var seats=document.getElementById('ds-'+key);
  var hdr=document.getElementById('dh-'+key);
  var arr=document.getElementById('da-'+key);
  if(seats)seats.classList.toggle('open',!!S.openDistricts[dname]);
  if(hdr)hdr.classList.toggle('open',!!S.openDistricts[dname]);
  if(arr)arr.classList.toggle('open',!!S.openDistricts[dname]);
}

function switchTab(tab){
  S.tab=tab;
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active',t.getAttribute('data-tab')===tab);
  });
  var tc=document.getElementById('tc');
  if(tc){
    tc.innerHTML=tabContent();
    if(tab==='allpred')loadAllPred();
    if(tab==='analytics')loadAnalytics();
    if(tab==='leaderboard')loadLeaderboard();
    if(tab==='admin-users')loadAdminUsers();
    if(tab==='actual-results')loadActualResults();
    if(tab==='predict')loadNews();
  }
}

function render(){
  document.getElementById('root').innerHTML=S.loggedIn?appHTML():authHTML();
  if(!S.loggedIn){var i=document.getElementById('au');if(i)i.focus();}
  var tc=document.getElementById('tc');
  if(tc){
    if(S.tab==='allpred')loadAllPred();
    if(S.tab==='analytics')loadAnalytics();
    if(S.tab==='leaderboard')loadLeaderboard();
    if(S.tab==='admin-users')loadAdminUsers();
    if(S.tab==='actual-results')loadActualResults();
    if(S.tab==='predict')loadNews();
  }
}

function appHTML(){
  var tabs=S.isAdmin
    ?[['admin-users','Players'],['actual-results','Actual Results'],['allpred','All Predictions'],['analytics','Analytics'],['leaderboard','Leaderboard']]
    :[['predict','My Predictions'],['allpred','All Predictions'],['analytics','Analytics'],['leaderboard','Leaderboard']];

    '<div><div class="topbar-title">🗳️ Kerala Predictor</div><div class="topbar-sub">2026 Assembly Election</div></div>'+

function loadNews(){
  var ticker=document.getElementById('news-ticker');
  if(!ticker)return;
  api('GET','/api/news',null,function(r){
    if(!r.success||!r.items||!r.items.length)return;
    var items=r.items.concat(r.items);
    ticker.innerHTML=items.map(function(item){
      return '<a class="news-item" href="'+item.link+'" target="_blank" rel="noopener">📰 '+item.title+'</a>';
    }).join('');
  });
}

function buildBarChart(users,title,subtitle,accentColor){
  if(!users||!users.length)return '';
  if(!users||!users.length)return '';
  var filled=users.filter(function(u){return u.filled>0;});
  if(!filled.length){
    var emptyMsg=users.length>0?('('+users.length+' player'+(users.length!==1?'s':'')+' in this team, no predictions yet)'):'No players in this team yet.';
    return '<div class="chart-card" style="'+(accentColor?'border-color:'+accentColor+';border-width:2px':'')+'">'+
      '<div class="chart-title">'+(title||'📊 Chart')+'</div>'+
      '<div class="chart-sub" style="padding:.5rem 0">'+emptyMsg+'</div></div>';
  }
  var avgT={LDF:0,UDF:0,NDA:0,Others:0};
  filled.forEach(function(u){PARTIES.forEach(function(p){avgT[p]+=(u.totals[p]||0);});});
  var avgs=PARTIES.map(function(p){return{party:p,avg:avgT[p]/filled.length};});
  var W=500,H=260,PL=55,PR=30,PT=30,PB=55;
  var cw=W-PL-PR,ch=H-PT-PB;
  var maxVal=Math.ceil(Math.max.apply(null,avgs.map(function(a){return a.avg;}))/10)*10+10;
  var barW=Math.floor(cw/PARTIES.length*0.55);
  var gap=Math.floor(cw/PARTIES.length);
  var grid='';
  for(var s=0;s<=5;s++){
    var v=Math.round(maxVal/5*s);
    var y=(PT+ch-(v/maxVal)*ch).toFixed(1);
    grid+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#e0e4e8" stroke-width="1"/>';
    grid+='<text x="'+(PL-8)+'" y="'+(parseFloat(y)+4)+'" text-anchor="end" font-size="11" fill="#9aa0aa">'+v+'</text>';
  }
  var bars='';
  avgs.forEach(function(a,i){
    var bx=PL+i*gap+(gap-barW)/2;
    var bh=(a.avg/maxVal)*ch;
    var by=PT+ch-bh;
    var col=PARTY_COLORS[a.party];
    bars+='<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+barW+'" height="'+bh.toFixed(1)+'" fill="'+col+'" rx="4" opacity="0.9"/>';
    bars+='<text x="'+(bx+barW/2).toFixed(1)+'" y="'+(by-7).toFixed(1)+'" text-anchor="middle" font-size="13" fill="'+col+'" font-weight="700">'+a.avg.toFixed(1)+'</text>';
    bars+='<text x="'+(bx+barW/2).toFixed(1)+'" y="'+(PT+ch+20)+'" text-anchor="middle" font-size="13" fill="'+col+'" font-weight="700">'+a.party+'</text>';
  });
  var yLabel='<text x="13" y="'+(H/2)+'" text-anchor="middle" font-size="11" fill="#9aa0aa" transform="rotate(-90,13,'+(H/2)+')">Avg Seats</text>';
  var xAxis='<line x1="'+PL+'" y1="'+(PT+ch)+'" x2="'+(W-PR)+'" y2="'+(PT+ch)+'" stroke="#c8cdd4" stroke-width="1.5"/>';
  var chartTitle=title||'📊 Average Seat Predictions by Party';
  var chartSub=subtitle||('Average seats predicted per party across '+filled.length+' player'+(filled.length!==1?'s':'')+' who have made predictions.');
  // Apply accent color tint to card border if provided
  var cardStyle=accentColor?'border-color:'+accentColor+';border-width:2px':'';
  return '<div class="chart-card" style="'+cardStyle+'">'+
    '<div class="chart-title">'+chartTitle+'</div>'+
    '<div class="chart-sub">'+chartSub+' ('+filled.length+' player'+(filled.length!==1?'s':'')+')</div>'+
    '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="max-width:500px;display:block;margin:0 auto">'+
      yLabel+grid+xAxis+bars+
    '</svg></div>';
}

      var actual=ar.success?ar.results:{};

function refreshCompare(){
  var sel=document.getElementById('compare-select');
  if(!sel)return;
  S.compareWith=sel.value;
  if(S.compareWith&&!compareCache[S.compareWith]){
    api('GET','/api/summary/user/'+encodeURIComponent(S.compareWith),null,function(r){
      if(r.success){compareCache[S.compareWith]=r.predictions;redrawAnalyticsPanels();}
    });
  } else redrawAnalyticsPanels();
}

function redrawAnalyticsPanels(){
  document.querySelectorAll('[id^="an-det-"]').forEach(function(el){
    if(!el.classList.contains('open'))return;
    var preds=el.getAttribute('data-preds');
    var actual=el.getAttribute('data-actual');
    var user=el.getAttribute('data-user');
    if(!preds)return;
    var p=JSON.parse(preds);
    var a=actual?JSON.parse(actual):null;
    var cmp=S.compareWith&&S.compareWith!==user?compareCache[S.compareWith]:null;
    el.innerHTML=buildTable(p,a&&Object.keys(a).length?a:null,cmp);
  });
}

function buildTable(preds,actual,compare){
  var rows='';var strikes=0,total=0;
  DISTRICTS.forEach(function(d){
    d.seats.forEach(function(s){
      var pred=preds[s.id];
      var act=actual?actual[s.id]:null;
      var cmp=compare?compare[s.id]:null;
      var strikeHTML='<span class="sbadge sb-pend">—</span>';
      var rowCls='';
      if(act&&pred){
        total++;
        if(act===pred){strikes++;strikeHTML='<span class="sbadge sb-yes">Yes ✅</span>';rowCls='strike-yes';}
        else{strikeHTML='<span class="sbadge sb-no">No ❌</span>';rowCls='strike-no';}
      } else if(act&&!pred){
        strikeHTML='<span class="sbadge sb-no">No ❌</span>';rowCls='strike-no';
      }
      var matchBadge='';
      if(compare!==null&&pred&&cmp){
        if(pred===cmp){matchBadge=' <span class="sbadge sb-match">🟡</span>';if(!rowCls)rowCls='match-row';}
      }
      rows+='<tr class="'+rowCls+'">'+
        '<td style="color:var(--tx3)">'+s.id+'</td>'+
        '<td style="white-space:nowrap">'+s.name+'</td>'+
        '<td style="color:var(--tx3);font-size:11px">'+d.name+'</td>'+
        '<td><span class="ppill '+(pred?'pp-'+PC[pred]:'pp-none')+'">'+(pred||'—')+'</span></td>'+
        (actual!==null?'<td><span class="ppill '+(act?'pp-'+PC[act]:'pp-none')+'">'+(act||'—')+'</span></td>':'')  +
        (actual!==null?'<td>'+strikeHTML+'</td>':'')  +
        (compare!==null?'<td><span class="ppill '+(cmp?'pp-'+PC[cmp]:'pp-none')+'">'+(cmp||'—')+'</span>'+matchBadge+'</td>':'')  +
      '</tr>';
    });
  });
  var summary='';
  if(actual!==null){
    var sr=Math.round(strikes/140*100);
    summary='<div style="padding:10px 12px;background:var(--sur2);border-bottom:1px solid var(--bd);font-size:13px;display:flex;gap:12px;flex-wrap:wrap">'+
      '<span>✅ Correct: <strong>'+strikes+'</strong></span>'+
      '<span>❌ Wrong: <strong>'+(total-strikes)+'</strong></span>'+
      '<span>📊 Strike rate: <strong>'+sr+'%</strong></span>'+
    '</div>';
  }
  var extraH=actual!==null?'<th>Actual</th><th>Strike</th>':'';
  var cmpH=compare!==null?'<th>'+S.compareWith+'</th>':'';
  return summary+'<div style="overflow-x:auto"><table class="dtbl">'+
    '<thead><tr><th>#</th><th>Constituency</th><th>District</th><th>Predicted</th>'+extraH+cmpH+'</tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>';
}

function uploadCSV(){
  var fileInput=document.getElementById('csv-file');
  var resultEl=document.getElementById('upload-result');
  if(!fileInput||!fileInput.files.length){
    if(resultEl)resultEl.innerHTML='<span style="color:var(--ldf)">Please select a CSV file first.</span>';
    return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
    var start=lines[0].toLowerCase().includes('username')?1:0;
    var rows=[];
    for(var i=start;i<lines.length;i++){
      var parts=lines[i].split(',');
      if(parts.length<3)continue;
      var username=parts[0].trim();
      var cid=parseInt(parts[1].trim());
      // Support: username,cid,party OR username,cid,constname,party OR username,cid,constname,party,team
      var party=(parts.length>=4?parts[3]:parts[2]).trim();
      var team=parts.length>=5?parts[4].trim():'Neutral';
      rows.push({username:username,constituencyId:cid,party:party,team:team});
    }
    if(!rows.length){if(resultEl)resultEl.innerHTML='<span style="color:var(--ldf)">No valid rows found.</span>';return;}
    if(resultEl)resultEl.innerHTML='<span style="color:var(--tx2)">Uploading '+rows.length+' rows...</span>';
    api('POST','/api/admin/bulk-upload',{rows:rows},function(r){
      if(!r.success){if(resultEl)resultEl.innerHTML='<span style="color:var(--ldf)">Error: '+r.error+'</span>';return;}
      var res=r.results;
      var msg='<span style="color:var(--grn)">✅ '+res.success+' predictions uploaded.</span>';
      if(res.skipped)msg+=' <span style="color:#854f0b">⚠️ '+res.skipped+' skipped.</span>';
      if(res.errors&&res.errors.length){
        msg+='<details style="margin-top:6px"><summary style="font-size:12px;cursor:pointer">'+res.errors.length+' error(s)</summary>'+
          '<div style="font-size:11px;color:var(--ldf);margin-top:4px">'+res.errors.slice(0,10).join('<br>')+'</div></details>';
      }
      if(resultEl)resultEl.innerHTML=msg;
      // Verify actual DB count
      fetch('/api/admin/users').then(function(r){return r.json();}).then(function(r){
        if(r.success){
          var total=r.users.reduce(function(sum,u){return sum+u.filled;},0);
          if(resultEl)resultEl.innerHTML=msg+' <span style="color:var(--tx2);font-size:12px">DB now has '+total+' total predictions across '+r.users.length+' players.</span>';
        }
      });
      loadAdminUsers();
    });
  };
  reader.readAsText(fileInput.files[0]);
}

function toggleSelectAll(cb){
  document.querySelectorAll('.player-chk').forEach(function(c){c.checked=cb.checked;});
  onPlayerCheck();
}

function onPlayerCheck(){
  var checked=document.querySelectorAll('.player-chk:checked');
  var all=document.querySelectorAll('.player-chk');
  var btn=document.getElementById('bulk-del-btn');
  var selAll=document.getElementById('sel-all');
  if(btn){btn.style.display=checked.length>0?'inline-flex':'none';btn.textContent='🗑 Delete Selected ('+checked.length+')';}
  if(selAll&&all.length>0){selAll.indeterminate=checked.length>0&&checked.length<all.length;selAll.checked=checked.length===all.length;}
}

function bulkDeletePlayers(){
  var checked=document.querySelectorAll('.player-chk:checked');
  if(!checked.length)return;
  var names=Array.from(checked).map(function(c){return c.getAttribute('data-name');});
  if(!confirm('Delete '+checked.length+' player'+(checked.length>1?'s':'')+' and all their predictions?\n\n'+names.join(', ')))return;
  var ids=Array.from(checked).map(function(c){return parseInt(c.getAttribute('data-id'));});
  var done=0;
  ids.forEach(function(uid){
    api('POST','/api/admin/delete-user',{userId:uid},function(){
      if(++done===ids.length)loadAdminUsers();
    });
  });
}

function deleteUser(uid,username){
  if(!confirm('Delete all data for "'+username+'"?'))return;
  api('POST','/api/admin/delete-user',{userId:uid},function(r){
    if(r.success)loadAdminUsers();else alert(r.error||'Error');
  });
}

// ── ACTUAL RESULTS ────────────────────────────────────────────
function loadActualResults(){
  api('GET','/api/results/actual',null,function(ar){
    var actual=ar.success?ar.results:{};
    var filled=Object.keys(actual).length;
    var counts={LDF:0,UDF:0,NDA:0,Others:0};
    Object.values(actual).forEach(function(p){counts[p]=(counts[p]||0)+1;});
    var blocks='';
    DISTRICTS.forEach(function(d){
      var rows='';
      d.seats.forEach(function(s){
        var cur=actual[s.id];
        var btns=PARTIES.map(function(p){
          return '<button class="pbtn pbtn-'+PC[p]+(cur===p?' sel':'')+'" onclick="setActual('+s.id+',\''+p+'\')">'+p+'</button>';
        }).join('');
        rows+='<div class="crow">'+
          '<span class="cnum">'+s.id+'</span>'+
          '<div class="cinfo"><div class="cname">'+s.name+'</div>'+
          '<div class="cmla">2021: '+s.mla+'<span class="mpill mp-'+PC[s.party]+'">'+s.party+'</span></div></div>'+
          '<div class="pbtns">'+btns+'</div>'+
          '<span class="sind" id="ar-si-'+s.id+'"></span>'+
        '</div>';
      });
      blocks+='<div style="font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;'+
        'background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0;padding:8px 12px;margin-top:.5rem">'+d.name+'</div>'+
        '<div style="border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;margin-bottom:.25rem">'+rows+'</div>';
    });
    var el=document.getElementById('ar-content');
    if(!el)return;
    el.innerHTML=
      '<div class="adm-section">'+
        '<div class="adm-hdr">'+
          '<span>📊 Actual 2026 Results — '+filled+'/140 (2021 pre-loaded)</span>'+
          '<div style="display:flex;gap:6px">'+
            '<a class="csv-btn" href="/api/admin/csv/actual">⬇ CSV</a>'+
            '<button class="clear-all-btn" onclick="clearAllResults()">Clear All</button>'+
          '</div>'+
        '</div>'+
        '<div style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--bd)">'+
          '<span class="ppill pp-ldf">LDF '+counts.LDF+'</span>'+
          '<span class="ppill pp-udf">UDF '+counts.UDF+'</span>'+
          '<span class="ppill pp-nda">NDA '+counts.NDA+'</span>'+
          '<span class="ppill pp-oth">Others '+counts.Others+'</span>'+
          '<span style="font-size:12px;color:var(--tx3);margin-left:auto">Tap to set, tap again to clear</span>'+
        '</div>'+
      '</div>'+blocks;
  });
}

function setActual(cid,party){
  api('GET','/api/results/actual',null,function(ar){
    var actual=ar.success?ar.results:{};
    var si=document.getElementById('ar-si-'+cid);
    if(si)si.textContent='💾';
    if(actual[cid]===party){
      api('POST','/api/results/clear-one',{constituencyId:cid},function(){if(si)si.textContent='';loadActualResults();});
    } else {
      api('POST','/api/results/save',{constituencyId:cid,party:party},function(r){
        if(si)si.textContent=r.success?'✓':'✗';
        setTimeout(function(){loadActualResults();},300);
      });
    }
  });
}

function clearAllResults(){
  if(!confirm('Clear ALL 140 results? Strike rates will reset.'))return;
  api('POST','/api/results/clear-all',{},function(r){if(r.success)loadActualResults();else alert('Error');});
}

init();
</script>
